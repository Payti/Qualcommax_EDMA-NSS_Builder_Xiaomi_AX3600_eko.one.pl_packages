name: Build

# All build/release/cleanup behavior reads its configuration from builder.yml.
# The pipeline is a matrix over builder.yml's `variants:` list:
#   config -> check-updates -> build (matrix) -> prune
# The cron schedule below is the only knob that cannot be expressed in builder.yml
# (GitHub Actions cron values must be static strings in this file).
on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Variant(s) to build"
        type: choice
        options:
          - all
          - edma-nss
        default: all
  push:
    branches: [main]
    paths:
      - builder.yml
      - 'devices/**'
      - 'common/**'
      - 'patches/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  schedule:
    - cron: "0 */2 * * *"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  config:
    name: Load builder.yml
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      matrix: ${{ steps.cfg.outputs.matrix }}
      release_keep: ${{ steps.cfg.outputs.release_keep }}
      artifact_retention_days: ${{ steps.cfg.outputs.artifact_retention_days }}
      prefixes: ${{ steps.cfg.outputs.prefixes }}
    steps:
      - uses: actions/checkout@v6
      - id: cfg
        env:
          EVENT_NAME: ${{ github.event_name }}
          VARIANT_INPUT: ${{ github.event.inputs.variant }}
        run: bash scripts/load-config.sh

  check-updates:
    name: Check upstreams
    needs: config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      matrix: ${{ steps.check.outputs.matrix }}
      has_builds: ${{ steps.check.outputs.has_builds }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        env:
          CONFIG_MATRIX: ${{ needs.config.outputs.matrix }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
        run: bash scripts/check-updates.sh

  build:
    name: Build firmware (${{ matrix.nss_version }})
    needs: [config, check-updates]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || needs.check-updates.outputs.build_required == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      actions: read
    
    strategy:
      matrix:
        nss_version: [edma-nss_12.5, edma-nss_11.4]
      fail-fast: false

    env:
      GH_TOKEN: ${{ github.token }}
      MAIN_SHA: ${{ needs.check-updates.outputs.main_sha }}
      NSS_SHA: ${{ needs.check-updates.outputs.nss_sha }}
      DEVICE: ${{ needs.config.outputs.device }}
      DEVICE_DIR: ${{ needs.config.outputs.device_dir }}
      RELEASE_PREFIX: ${{ needs.config.outputs.release_prefix }}-${{ matrix.nss_version }}
      ARTIFACT_RETENTION_DAYS: ${{ needs.config.outputs.artifact_retention_days }}
      FEEDS_LINES: ${{ needs.config.outputs.feeds_lines }}

    steps:
      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bzip2 g++ gawk gcc git glibc-source libncurses-dev make rsync

      - name: Checkout OpenWrt source
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.config.outputs.upstream_repo || 'openwrt/openwrt' }}
          ref: ${{ env.MAIN_SHA || 'main' }}
          fetch-depth: 0
          path: openwrt

      - name: Checkout builder repo
        uses: actions/checkout@v6
        with:
          path: builder
      - name: Tweak config for selected NSS Firmware version
        run: |
          set -euo pipefail
          
          DEVICE_DIR=$(bash builder/scripts/load-config.sh --get-device-dir 2>/dev/null || grep "device_dir" builder/builder.yml | cut -d"'" -f2 || echo "devices/xiaomi_ax3600")
          
          BASE_CONFIG="builder/${DEVICE_DIR}/config.edma-nss"
          TARGET_CONFIG="builder/${DEVICE_DIR}/config.${{ matrix.nss_version }}"

          if [ -f "$BASE_CONFIG" ]; then
            cp "$BASE_CONFIG" "$TARGET_CONFIG"
            sed -i '/CONFIG_NSS_FIRMWARE_VERSION_/d' "$TARGET_CONFIG" || true
            
            if [ "${{ matrix.nss_version }}" = "edma-nss_11.4" ]; then
              echo "CONFIG_NSS_FIRMWARE_VERSION_11_4=y" >> "$TARGET_CONFIG"
              echo "Successfully generated and patched $TARGET_CONFIG with CONFIG_NSS_FIRMWARE_VERSION_11_4=y"
            else
              echo "CONFIG_NSS_FIRMWARE_VERSION_12_5=y" >> "$TARGET_CONFIG"
              echo "Successfully generated and patched $TARGET_CONFIG with CONFIG_NSS_FIRMWARE_VERSION_12_5=y"
            fi
          else
            echo "::error::Base config file truly not found at $BASE_CONFIG"
            exit 1
          fi

      - name: Prepare build environment
        run: |
          set -euo pipefail
          
          export DEVICE=$(grep "device:" builder/builder.yml | head -n1 | tr -d ' ' | cut -d':' -f2 | tr -d '"'\''')
          export DEVICE_DIR=$(grep "device_dir:" builder/builder.yml | head -n1 | tr -d ' ' | cut -d':' -f2 | tr -d '"'\''')
          export VARIANT="${{ matrix.nss_version }}"
          export OPENWRT_DIR="${{ github.workspace }}/openwrt"
          export BUILDER_REPO="${{ github.workspace }}/builder"
          
          echo "[DEBUG] Wykryte zmiennes z builder.yml:"
          echo "DEVICE: $DEVICE"
          echo "DEVICE_DIR: $DEVICE_DIR"
          echo "VARIANT: $VARIANT"
          
          bash "$BUILDER_REPO/scripts/prepare-build.sh"

      - name: Dynamically update custom OpenWrt banner info
        working-directory: openwrt
        run: |
          set -euo pipefail

          if [ -f scripts/getver.sh ]; then
            OPENWRT_VERSION_RAW=$(bash scripts/getver.sh)
          else
            OPENWRT_VERSION_RAW=$(git rev-parse --short=10 HEAD)
          fi

          OPENWRT_VERSION="OpenWrt SNAPSHOT, ${OPENWRT_VERSION_RAW}"
          CURRENT_BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")

          if [ -f files/etc/banner ]; then
            VERSION_LINE="OpenWrt SNAPSHOT, ${OPENWRT_VERSION_RAW} (${{ matrix.nss_version }})"
            DATE_LINE="Build time: $CURRENT_BUILD_TIME"

            VERSION_PADDING=$(printf '%-74s' "$VERSION_LINE")
            FINAL_VERSION_ROW=" | ${VERSION_PADDING}|"

            DATE_PADDING=$(printf '%-74s' "$DATE_LINE")
            FINAL_DATE_ROW=" | ${DATE_PADDING}|"

            sed -i "s#.*VERSION_PLACEHOLDER.*#$FINAL_VERSION_ROW#g" files/etc/banner
            sed -i "s#.*DATE_PLACEHOLDER.*#$FINAL_DATE_ROW#g" files/etc/banner

            echo "Successfully injected real git version and build time into EDMA-NSS banner."
          else
            echo "::warning::Custom banner file was not deployed by prepare-build.sh to openwrt/files/etc/banner"
            VERSION_LINE="OpenWrt SNAPSHOT"
            FINAL_VERSION_ROW=""
            DATE_LINE=""
            FINAL_DATE_ROW=""
          fi

          TARGET_RELEASE_FILE="package/base-files/files/etc/openwrt_release"
          DISTRIB_DESCRIPTION="${OPENWRT_VERSION} (${{ matrix.nss_version }} - EDMA-NSS build by @Payti)"
          if [ -f "$TARGET_RELEASE_FILE" ]; then
            sed -i '/DISTRIB_DESCRIPTION=/d' "$TARGET_RELEASE_FILE" || true
            echo "DISTRIB_DESCRIPTION='${DISTRIB_DESCRIPTION}'" >> "$TARGET_RELEASE_FILE"
          fi

          echo "=================================================="
          echo "OPENWRT_VERSION:         $OPENWRT_VERSION"
          echo "CURRENT_BUILD_TIME:      $CURRENT_BUILD_TIME"
          echo "VERSION_LINE:            ${VERSION_LINE:-}"
          echo "DATE_LINE:               ${DATE_LINE:-}"
          echo "FINAL_VERSION_ROW:       ${FINAL_VERSION_ROW:-}"
          echo "FINAL_DATE_ROW:          ${FINAL_DATE_ROW:-}"
          echo "=================================================="

      - name: Set reproducible-build env
        working-directory: openwrt
        run: |
          set -euo pipefail
          {
            echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)"
            echo "TZ=UTC"
            echo "LC_ALL=C"
            echo "KBUILD_BUILD_USER=builder"
            echo "KBUILD_BUILD_HOST=github"
          } >>"$GITHUB_ENV"

      - name: Download sources
        working-directory: openwrt
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            make download -j"$(nproc)" V=s && break
            echo "Download attempt $attempt failed; retrying..."
            sleep 5
          done

      - name: Build
        working-directory: openwrt
        run: |
          set -euo pipefail
          if ! make -j"$(nproc)"; then
            echo "::warning::Parallel build failed; retrying single-threaded for diagnostics"
            make -j1 V=s
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: xiaomi_ax3600-${{ matrix.nss_version }}-images
          path: openwrt/bin/targets/qualcommax/ipq807x
          if-no-files-found: error
          retention-days: 7

      - name: Publish release
        id: release
        run: |
          set -euo pipefail
          
          date=$(date -u +%F)
          timestamp=$(date -u +%Y%m%dT%H%M%SZ)
          
          # Bezpieczny tag wyjściowy bez wiodących myślników
          tag_name="edma-nss-build-${{ matrix.nss_version }}-${timestamp}-${GITHUB_RUN_ID}"
          echo "release_tag=$tag_name" >>"$GITHUB_OUTPUT"
          
          # Dynamiczne pobranie nazwy urządzenia z pliku builder.yml zamiast sztywnego tekstu
          DETECTED_DEVICE=$(grep "device:" builder/builder.yml | head -n1 | tr -d ' ' | cut -d':' -f2 | tr -d '"'\''')
          
          # Dynamiczne wyciągnięcie faktycznych hashy prosto z repozytoriów Git
          REAL_MAIN_SHA=$(cd openwrt && git rev-parse HEAD)
          REAL_NSS_SHA=$(cd builder && git rev-parse HEAD)

          # Generowanie w pełni uniwersalnych notatek wydania dla dowolnego urządzenia
          {
            echo "## OpenWrt EDMA-NSS Build — ${{ matrix.nss_version }}"
            echo "- **Date**: $date"
            echo "- **Device**: \`${DETECTED_DEVICE:-unknown}\`"
            echo "- **NSS FW Flavor**: \`${{ matrix.nss_version }}\`"
            echo "- **Upstream**: \`${REAL_MAIN_SHA}\`"
            echo "- **NSS**: \`${REAL_NSS_SHA}\`"
            echo "- **Trigger**: \`${GITHUB_EVENT_NAME}\`"
            echo "- **Compiled by**: @Payti"
          } >release_notes.md
          
          mapfile -t assets < <(find openwrt/bin/targets/qualcommax/ipq807x/ -type f -not -path "*/packages/*")
          
          for asset in "${assets[@]}"; do
            dir=$(dirname "$asset")
            base=$(basename "$asset")
            if [[ ! "$base" =~ ^edma-nss_ ]]; then
              mv "$asset" "$dir/${{ matrix.nss_version }}-$base"
            fi
          done
          
          mapfile -t renamed_assets < <(find openwrt/bin/targets/qualcommax/ipq807x/ -type f -not -path "*/packages/*")
          
          gh release create "$tag_name" \
            --repo "$GITHUB_REPOSITORY" \
            --title "OpenWrt EDMA-NSS Build $date (${{ matrix.nss_version }})" \
            --notes-file release_notes.md \
            "${renamed_assets[@]}"
          
          {
            echo "## Release (${{ matrix.nss_version }})"
            echo "- tag: \`${tag_name}\`"
            echo "- assets: ${#renamed_assets[@]}"
          } >>"$GITHUB_STEP_SUMMARY"

  prune:
    name: Prune old releases
    needs: [config, build]
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      KEEP: ${{ needs.config.outputs.release_keep || 5 }}
      PREFIXES: ${{ needs.config.outputs.prefixes }}
    steps:
      - uses: actions/checkout@v6
      - name: Prune each variant prefix
        run: |
          set -euo pipefail
          CURRENT_PREFIXES="${PREFIXES:-edma-nss_11.4 edma-nss_12.5}"
          while IFS= read -r prefix; do
            [[ -z "$prefix" ]] && continue
            echo "::group::prune $prefix"
            PREFIX="$prefix" bash scripts/prune-releases.sh || true
            echo "::endgroup::"
          done <<< "$CURRENT_PREFIXES"
