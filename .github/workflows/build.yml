name: Build

# Builds the edma-nss images for the Xiaomi AX3600:
#   check -> build (parallel via matrix) -> prune
# All build parameters live in the `env:` block below — it is the one file you edit.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'devices/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  schedule:
    - cron: "0 */2 * * *"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  UPSTREAM_REPO: JuliusBairaktaris/openwrt-nss-edma
  UPSTREAM_REF: nss-edma-rework
  NSS_REPO: JuliusBairaktaris/nss-packages
  NSS_REF: edma-nss
  TARGET: qualcommax/ipq807x
  DEVICE: xiaomi_ax3600
  DEVICE_DIR: devices/xiaomi_ax3600
  RELEASE_PREFIX: edma-nss
  KEEP: "4"
  FEEDS: |
    src-git nss https://github.com/JuliusBairaktaris/nss-packages.git;edma-nss
    src-git obsy https://github.com/obsy/packages

jobs:
  check:
    name: Check upstream
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      EVENT_NAME: ${{ github.event_name }}
    outputs:
      upstream_sha: ${{ steps.check.outputs.upstream_sha }}
      nss_sha: ${{ steps.check.outputs.nss_sha }}
      need: ${{ steps.check.outputs.need }}
    steps:
      - uses: actions/checkout@v7
      - id: check
        run: bash scripts/check-updates.sh

  build:
    name: Build OpenWrt (edma-${{ matrix.nss_version }})
    needs: check
    if: needs.check.outputs.need == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        nss_version: ["nss_12.5", "nss_11.4"]
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bzip2 g++ gawk gcc git glibc-source libncurses-dev make rsync mc

      - name: Start tmate session in background (5 min timeout) for SSH login
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
          detached: true
          connect-timeout-seconds: 300

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          swap-storage: false

      - name: Checkout OpenWrt source
        uses: actions/checkout@v7
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ needs.check.outputs.upstream_sha }}
          fetch-depth: 0
          path: openwrt

      - name: Checkout builder repo
        uses: actions/checkout@v7
        with:
          path: builder

      - name: Prepare build environment
        env:
          OPENWRT_DIR: ${{ github.workspace }}/openwrt
          BUILDER_REPO: ${{ github.workspace }}/builder
          VARIANT: ${{ matrix.nss_version }}
        run: bash builder/scripts/prepare-build.sh

      # KROK B: Dynamiczne ustawianie wersji NSS Firmware w pliku .config
      - name: Tweak config for selected NSS Firmware version
        run: |
          set -euo pipefail
          CONFIG_FILE="builder/${{ env.DEVICE_DIR }}/config"
          if [ -f "$CONFIG_FILE" ]; then
            # Wyczyszczenie dotychczasowych flag wersji NSS, aby nie było konfliktów
            sed -i '/CONFIG_NSS_FIRMWARE_VERSION_/d' "$CONFIG_FILE"

            # Wstrzyknięcie odpowiedniej flagi na podstawie wybranego wariantu macierzy
            if [ "${{ matrix.nss_version }}" = "nss_11.4" ]; then
              {
                # Profil pamięci dla IPQ
                echo "CONFIG_IPQ_MEM_PROFILE_512=y"
                echo "CONFIG_KERNEL_IPQ_MEM_PROFILE=512"
                echo "CONFIG_PACKAGE_kmod-qca-mcs=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv=y"

                # =========================================================================
                # ABSOLUTNY, MAKSYMALNY I TOTALNY ZESTAW NSS DLA REPOZYTORIUM (11.4 / MAX)
                # =========================================================================

                # 1. Wersja Firmware oraz Podstawa Sterownika Jądra
                echo "CONFIG_NSS_FIRMWARE_VERSION_11_4=y"
                echo "CONFIG_PACKAGE_nss-firmware=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv=y"
                echo "CONFIG_NSS_DRV_BRIDGE_ENABLE=y"
                echo "CONFIG_NSS_DRV_IGS_ENABLE=y"
                echo "CONFIG_NSS_DRV_IPV6_ENABLE=y"
                echo "CONFIG_NSS_DRV_MIRROR_ENABLE=y"
                echo "CONFIG_NSS_DRV_PPPOE_ENABLE=y"
                echo "CONFIG_NSS_DRV_SHAPER_ENABLE=y"
                echo "CONFIG_NSS_DRV_VIRT_IF_ENABLE=y"
                echo "CONFIG_NSS_DRV_WIFIOFFLOAD_ENABLE=y"
                echo "CONFIG_PACKAGE_MAC80211_NSS_SUPPORT=y"

                # 2. Architektura bazowa, Sieć, Przekierowania i Filtry
                echo "CONFIG_PACKAGE_kmod-qca-nss-ifb=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-netlink=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-mirror=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-vlan=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-bridge-mgr=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-vlan-mgr=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-netfilter=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-ecm=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-msc=y"

                # 3. Klienci Sieciowi, Tunele, Wi-Fi i Protokóły WAN
                echo "CONFIG_PACKAGE_qca-nss-clients=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-clients=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-pppoe=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-pptp=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-l2tpv2=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-gre=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-gre-redir=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-map-t=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-tun6rd=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-tunipip6=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-vxlanmgr=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-pvxlan=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-capwap=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-tproxy=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-qdisc=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-igs=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-lag-mgr=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-wifi-meshmgr=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-wlan-mgr=y"

                # 4. Podsystemy Kryptograficzne, Bezpieczeństwo i Sprzętowy OpenVPN (v1 + v2)
                echo "CONFIG_PACKAGE_kmod-qca-nss-crypto=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-crypto-v2=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-cfi=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-cfi-v2=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-cfi-cryptoapi=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-cfi-ocf=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-macsec=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-ipsec=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-dtls=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-tlsmgr=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-crypto-tool=y"
                echo "CONFIG_PACKAGE_qca-nss-crypto-tool=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-ovpn-mgr=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-ovpn-link=y"

                # 5. Odciążanie Głosu / Audio (DSP / PCM)
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-pcm=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-ccp=y"

                # 6. Diagnostyka, Testy i Userspace (Wszystkie możliwe narzędzia)
                echo "CONFIG_PACKAGE_nss-userspace-oss=y"
                echo "CONFIG_PACKAGE_nss-userspace-oss-lib=y"
                echo "CONFIG_PACKAGE_nss-userspace-oss-nl=y"
                echo "CONFIG_PACKAGE_nssinfo=y"
                echo "CONFIG_PACKAGE_libnl-nss=y"
                echo "CONFIG_PACKAGE_qca-nss-crypto-perf=y"
                echo "CONFIG_PACKAGE_nss-utils=y"
                echo "CONFIG_PACKAGE_qca-nss-macsec-utils=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-profile=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-test=y"
                echo "CONFIG_PACKAGE_kmod-qca-nss-drv-pktinject=y"

                # =========================================================================
                # POZOSTAŁE PAKIETY I MODUŁY SYSTEMOWE KONFIGURACJI
                # =========================================================================
                echo "CONFIG_ALL_KMODS=y"
                echo "CONFIG_ALL_NONSHARED=y"
                echo "CONFIG_PACKAGE_block-mount=m"
                echo "CONFIG_PACKAGE_kmod-crypto-crc32=m"
                echo "CONFIG_PACKAGE_kmod-fs-exfat=m"
                echo "CONFIG_PACKAGE_kmod-fs-f2fs=m"
                echo "CONFIG_PACKAGE_kmod-fs-ntfs3=m"
                echo "CONFIG_PACKAGE_kmod-fs-vfat=m"
                echo "CONFIG_PACKAGE_kmod-nls-cp437=m"
                echo "CONFIG_PACKAGE_kmod-nls-iso8859-1=m"
                echo "CONFIG_PACKAGE_kmod-nls-utf8=m"
                echo "CONFIG_PACKAGE_kmod-scsi-core=m"
                echo "CONFIG_PACKAGE_kmod-usb-storage=m"
                echo "CONFIG_PACKAGE_kmod-usb-storage-uas=m"
                echo "CONFIG_PACKAGE_ip-bridge=y"
                echo "CONFIG_PACKAGE_ip-full=y"
                echo "CONFIG_PACKAGE_ipset=m"
                echo "CONFIG_PACKAGE_iptables-mod-conntrack-extra=y"
                echo "CONFIG_PACKAGE_kmod-bonding=y"
                echo "CONFIG_PACKAGE_kmod-crypto-kpp=y"
                echo "CONFIG_PACKAGE_kmod-crypto-lib-chacha20=y"
                echo "CONFIG_PACKAGE_kmod-crypto-lib-chacha20poly1305=y"
                echo "CONFIG_PACKAGE_kmod-crypto-lib-curve25519=y"
                echo "CONFIG_PACKAGE_kmod-crypto-lib-poly1305=y"
                echo "CONFIG_PACKAGE_kmod-crypto-sha1=y"
                echo "CONFIG_PACKAGE_kmod-crypto-sha256=y"
                echo "CONFIG_PACKAGE_kmod-gre=y"
                echo "CONFIG_PACKAGE_gre=y"
                echo "CONFIG_PACKAGE_kmod-macvlan=y"
                echo "CONFIG_PACKAGE_kmod-nat46=y"
                echo "CONFIG_PACKAGE_kmod-vxlan=y"
                echo "CONFIG_PACKAGE_kmod-sit=y"
                echo "CONFIG_PACKAGE_kmod-ip6-tunnel=y"
                echo "CONFIG_PACKAGE_igmpproxy=y"
                echo "CONFIG_PACKAGE_kmod-ipt-conntrack=y"
                echo "CONFIG_PACKAGE_kmod-ipt-conntrack-extra=y"
                echo "# CONFIG_PACKAGE_kmod-ipt-rtpengine is not set"
                echo "CONFIG_PACKAGE_kmod-iptunnel=y"
                echo "CONFIG_PACKAGE_kmod-l2tp=y"
                echo "CONFIG_PACKAGE_kmod-nf-conncount=y"
                echo "CONFIG_PACKAGE_kmod-nft-bridge=y"
                echo "CONFIG_PACKAGE_kmod-pppol2tp=y"
                echo "CONFIG_PACKAGE_kmod-pptp=y"
                echo "CONFIG_PACKAGE_kmod-thermal=m"
                echo "CONFIG_PACKAGE_kmod-tls=y"
                echo "CONFIG_PACKAGE_kmod-udptunnel4=y"
                echo "CONFIG_PACKAGE_kmod-udptunnel6=y"
                echo "CONFIG_PACKAGE_kmod-wireguard=y"
                echo "CONFIG_PACKAGE_libbpf=y"
                echo "CONFIG_PACKAGE_libcap=y"
                echo "CONFIG_PACKAGE_libcap-ng=y"
                echo "CONFIG_PACKAGE_libelf=y"
                echo "CONFIG_PACKAGE_libipset=m"
                echo "CONFIG_PACKAGE_libqrencode=y"
                echo "CONFIG_PACKAGE_libwebsockets-full=y"
                echo "CONFIG_PACKAGE_libxdp=m"
                echo "CONFIG_PACKAGE_libuv=y"
                echo "CONFIG_PACKAGE_libzstd=y"
                echo "CONFIG_PACKAGE_luci-app-mwan3=m"
                echo "CONFIG_PACKAGE_luci-app-ttyd=y"
                echo "CONFIG_PACKAGE_luci-app-upnp=y"
                echo "CONFIG_PACKAGE_luci-i18n-mwan3-pl=m"
                echo "CONFIG_PACKAGE_luci-i18n-ttyd-pl=y"
                echo "CONFIG_PACKAGE_luci-i18n-upnp-pl=y"
                echo "CONFIG_PACKAGE_luci-lib-base=y"
                echo "CONFIG_PACKAGE_luci-lib-ip=y"
                echo "CONFIG_PACKAGE_luci-lib-json=y"
                echo "CONFIG_PACKAGE_luci-lib-nixio=y"
                echo "CONFIG_PACKAGE_luci-lua-runtime=y"
                echo "CONFIG_PACKAGE_luci-mod-rpc=y"
                echo "CONFIG_PACKAGE_luci-proto-gre=y"
                echo "CONFIG_PACKAGE_luci-proto-vxlan=y"
                echo "CONFIG_PACKAGE_luci-proto-wireguard=y"
                echo "CONFIG_PACKAGE_map=y"
                echo "CONFIG_PACKAGE_mesh11sd=m"
                echo "CONFIG_PACKAGE_miniupnpd-nftables=y"
                echo "CONFIG_PACKAGE_mwan3=m"
                echo "CONFIG_PACKAGE_qca-ssdk-shell=y"
                echo "CONFIG_PACKAGE_qrencode=y"
                echo "CONFIG_PACKAGE_tc-full=y"
                echo "# CONFIG_PACKAGE_tc-tiny is not set"
                echo "CONFIG_PACKAGE_tcpdump=m"
                echo "CONFIG_PACKAGE_tcpdump-mini=m"
                echo "CONFIG_PACKAGE_ttyd=y"
                echo "CONFIG_PACKAGE_vxlan=y"
                echo "CONFIG_PACKAGE_wget-ssl=y"
                echo "CONFIG_PACKAGE_wireguard-tools=y"
                echo "CONFIG_PACKAGE_xdp-filter=m"
                echo "CONFIG_PACKAGE_xdp-loader=m"
                echo "CONFIG_PACKAGE_xdpdump=m"
                echo "CONFIG_PACKAGE_ds-lite=y"
                echo "CONFIG_PACKAGE_ethtool=y"
                echo "CONFIG_PACKAGE_luci-i18n-nss-pl=y"
                echo "CONFIG_PACKAGE_luci-i18n-nssqos-pl=y"
                echo "CONFIG_LUCI_LANG_pl=y"
              } >> "$CONFIG_FILE"
              echo "Successfully patched config with CONFIG_NSS_FIRMWARE_VERSION_11_4=y and added all absolute NSS components"
            else
              {
                echo "CONFIG_NSS_FIRMWARE_VERSION_12_5=y"
                echo "CONFIG_PACKAGE_luci-i18n-nss-pl=y"
                echo "CONFIG_PACKAGE_luci-i18n-nssqos-pl=y"
                echo "CONFIG_LUCI_LANG_pl=y"
              } >> "$CONFIG_FILE"
              echo "Successfully patched config with CONFIG_NSS_FIRMWARE_VERSION_12_5=y"
            fi

            # =========================================================================
            # 🇵🇱 SYSTEMOWE SCALENIE I18N DLA OBU WARIANTÓW (DODANIE DO RDZENIA LUCI-BASE)
            # =========================================================================
            SOURCE_PO_DIR="${{ github.workspace }}/builder/$DEVICE_DIR/po/pl"
            LUCI_BASE_PO="${{ github.workspace }}/openwrt/feeds/luci/modules/luci-base/po/pl/base.po"

            # Dynamiczne poszukiwanie pliku base.po w przypadku przesunięć w feedach LuCI
            if [ ! -f "$LUCI_BASE_PO" ]; then
                LUCI_BASE_PO=$(find ${{ github.workspace }}/openwrt/ -path "*/luci-base/po/pl/base.po" | head -n 1)
            fi

            if [ -n "$LUCI_BASE_PO" ] && [ -f "$LUCI_BASE_PO" ]; then
                if [ -f "$SOURCE_PO_DIR/luci-app-nss.po" ] && [ -f "$SOURCE_PO_DIR/luci-app-nssqos.po" ]; then
                    # 🔒 Blok spięty w klamry zgodny z rygorystyczną regułą SC2129
                    {
                      echo -e "\n"
                      cat "$SOURCE_PO_DIR/luci-app-nss.po"
                      echo -e "\n"
                      cat "$SOURCE_PO_DIR/luci-app-nssqos.po"
                    } >> "$LUCI_BASE_PO"
                    echo "--> SUCCESS: Pomyślnie scalono 71 fraz NSS z głównym słownikiem systemowym base.po"
                else
                    echo "ERROR: Brak plików źródłowych .po w katalogu urządzenia $SOURCE_PO_DIR!" >&2
                    exit 1
                fi
            else
                echo "ERROR: Krytyczny brak pliku base.po w strukturze OpenWrt!" >&2
                exit 1
            fi

            # 🛠️ ŁATANIE PLIKÓW MENU JULIUSA DLA STRUKTURY DYNAMICZNEJ LUCI-BASE
            FILES_DIR="${{ github.workspace }}/openwrt/package/nss/nss-tools/files"
            if [ -f "$FILES_DIR/luci-app-nss.menu.json" ] && [ -f "$FILES_DIR/luci-app-nssqos.menu.json" ]; then
                sed -i 's/"action":/"i18n": "luci-base",\n\t\t"action":/g' "$FILES_DIR/luci-app-nss.menu.json"
                sed -i 's/"action":/"i18n": "luci-base",\n\t\t"action":/g' "$FILES_DIR/luci-app-nssqos.menu.json"
                echo "--> SUCCESS: Pliki menu JSON zostały pomyślnie powiązane z domeną luci-base."
            else
                echo "ERROR: Brak krytycznych plików menu w $FILES_DIR!" >&2
                exit 1
            fi
            # 🛠️ PEŁNE DWUJĘZYCZNE ŁATANIE WSZYSTKICH 12 REGUŁ USŁUG W SKRYPCIE STARTOWYM NSSQOS.INIT
            INIT_QOS="${{ github.workspace }}/openwrt/package/nss/nss-tools/files/nssqos.init"
            if [ -f "$INIT_QOS" ]; then
                sed -i 's|"Game consoles / Call of Duty"|"Game consoles / Call of Duty (Konsole)"|g' "$INIT_QOS"
                sed -i 's|"PC games - Steam/Source/CS2"|"PC games - Steam/Source/CS2 (Gry PC)"|g' "$INIT_QOS"
                sed -i 's|"PC games - Riot (League/Valorant)"|"PC games - Riot (League/Valorant) (Gry PC)"|g' "$INIT_QOS"
                sed -i 's|"Video call - MS Teams"|"Video call - MS Teams (Wideorozmowy)"|g' "$INIT_QOS"
                sed -i 's|"Video call - Discord voice"|"Video call - Discord voice (Discord głos)"|g' "$INIT_QOS"
                sed -i 's|"Video call - WhatsApp"|"Video call - WhatsApp (Wideorozmowy)"|g' "$INIT_QOS"
                sed -i 's|"Video call - Zoom"|"Video call - Zoom (Wideorozmowy)"|g' "$INIT_QOS"
                sed -i 's|"VoIP - SIP signaling"|"VoIP - SIP signaling (Sygnalizacja SIP)"|g' "$INIT_QOS"
                sed -i 's|"VoIP - RTP media"|"VoIP - RTP media (Strumień RTP)"|g' "$INIT_QOS"

                # Ostatnie trzy brakujące reguły z dołu tabeli:
                sed -i 's|"IPTV - Telekom MagentaTV"|"IPTV - Telekom MagentaTV (Telewizja)"|g' "$INIT_QOS"
                sed -i 's|"Bulk / backups / torrents"|"Bulk / backups / torrents (Masowe/Torrenty)"|g' "$INIT_QOS"
                sed -i 's|"Video stream - my media CDN"|"Video stream - my media CDN (Strumieniowanie wideo)"|g' "$INIT_QOS"

                echo "--> SUCCESS: Pomyślnie zaaplikowano kompletny zestaw 12 dwujęzycznych reguł w nssqos.init"
            fi
            # =========================================================================

            # Ponowne skopiowanie pliku config i przeładowanie w openwrt
            cp "$CONFIG_FILE" ${{ github.workspace }}/openwrt/.config
            make -C ${{ github.workspace }}/openwrt defconfig
          fi

      - name: Dynamically update custom OpenWrt banner info
        working-directory: openwrt
        run: |
          set -euo pipefail

          if [ -f scripts/getver.sh ]; then
            OPENWRT_VERSION_RAW=$(bash scripts/getver.sh)
          else
            OPENWRT_VERSION_RAW=$(git rev-parse --short=10 HEAD)
          fi

          OPENWRT_VERSION="OpenWrt SNAPSHOT, ${OPENWRT_VERSION_RAW}"
          CURRENT_BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")

          if [ -f files/etc/banner ]; then
            VERSION_LINE="OpenWrt SNAPSHOT, ${OPENWRT_VERSION_RAW} (edma-${{ matrix.nss_version }})"
            DATE_LINE="Build time: $CURRENT_BUILD_TIME"

            VERSION_PADDING=$(printf '%-74s' "$VERSION_LINE")
            FINAL_VERSION_ROW=" | ${VERSION_PADDING}|"

            DATE_PADDING=$(printf '%-74s' "$DATE_LINE")
            FINAL_DATE_ROW=" | ${DATE_PADDING}|"

            sed -i "s#.*VERSION_PLACEHOLDER.*#$FINAL_VERSION_ROW#g" files/etc/banner
            sed -i "s#.*DATE_PLACEHOLDER.*#$FINAL_DATE_ROW#g" files/etc/banner

            echo "Successfully injected real git version and build time into EDMA-NSS banner."
          else
            echo "::warning::Custom banner file was not deployed by prepare-build.sh to openwrt/files/etc/banner"
            VERSION_LINE="OpenWrt SNAPSHOT"
            FINAL_VERSION_ROW=""
            DATE_LINE=""
            FINAL_DATE_ROW=""
          fi

          TARGET_RELEASE_FILE="package/base-files/files/etc/openwrt_release"
          DISTRIB_DESCRIPTION="${OPENWRT_VERSION} (edma-${{ matrix.nss_version }} - EDMA-NSS build by @Payti)"
          if [ -f "$TARGET_RELEASE_FILE" ]; then
            sed -i '/DISTRIB_DESCRIPTION=/d' "$TARGET_RELEASE_FILE" || true
            echo "DISTRIB_DESCRIPTION='${DISTRIB_DESCRIPTION}'" >> "$TARGET_RELEASE_FILE"
          fi

          echo "=================================================="
          echo "OPENWRT_VERSION:         $OPENWRT_VERSION"
          echo "CURRENT_BUILD_TIME:      $CURRENT_BUILD_TIME"
          echo "VERSION_LINE:            ${VERSION_LINE:-}"
          echo "DATE_LINE:               ${DATE_LINE:-}"
          echo "FINAL_VERSION_ROW:       ${FINAL_VERSION_ROW:-}"
          echo "FINAL_DATE_ROW:          ${FINAL_DATE_ROW:-}"
          echo "=================================================="

      - name: Set reproducible-build env
        working-directory: openwrt
        run: |
          set -euo pipefail
          {
            echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)"
            echo "TZ=UTC"
            echo "LC_ALL=C"
            echo "KBUILD_BUILD_USER=builder"
            echo "KBUILD_BUILD_HOST=github"
          } >>"$GITHUB_ENV"

      - name: Download sources
        working-directory: openwrt
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            make download -j"$(nproc)" V=s && break
            echo "Download attempt $attempt failed; retrying..."
            sleep 5
          done

      - name: Update and install feeds + disable packages
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          echo "### Usuwanie pakietów dahdi-linux, rtl8812au-ct, xdp-tools ponieważ się nie kompilują! ###"
          rm -rf package/feeds/telephony/dahdi-linux
          rm -rf package/kernel/rtl8812au-ct
          rm -rf package/network/utils/xdp-tools

          # 🛠️ AUTOMATYCZNA PĘTLA PATCHUJĄCA FEEDY (ZABEZPIECZONA ŚCIEŻKA WORKSPACE)
          shopt -s nullglob
          for p in "${{ github.workspace }}/builder/patches/feeds"/*/*.patch; do
            feed="feeds/$(basename "$(dirname "$p")")"
            if [ -d "$feed" ]; then
              if patch -p1 -d "$feed" --dry-run --forward <"$p" >/dev/null 2>&1; then
                echo "--> Patching $feed with $(basename "$p")"
                patch -p1 -d "$feed" --forward <"$p"
              else
                echo "--> Skipping $(basename "$p") (already applied or not applicable)"
              fi
            fi
          done
          shopt -u nullglob

      - name: Build
        working-directory: openwrt
        run: |
          set -euo pipefail
          # 1. Automatyczne uzupełnienie i odświeżenie opcji jądra do wartości domyślnych
          make target/linux/refresh
          # 2. Główna kompilacja z flagą blokującą interaktywne zapytania kconfig
          if ! make -j"$(nproc)" CONFIG_NOSILENTUPDATE=1; then
            echo "::warning::Parallel build failed; retrying single-threaded for diagnostics"
            make -j1 V=s CONFIG_NOSILENTUPDATE=1
          fi

      - name: Pack APK Packages
        working-directory: openwrt
        run: |
          echo "### Pakowanie skompilowanych pakietów .apk ###"
          if [ -d "bin/packages" ]; then
            tar -czf bin/targets/${{ env.TARGET }}/compiled_packages.tar.gz -C bin packages
            echo "-> Pakiety zostały pomyślnie spakowane do compiled_packages.tar.gz"
          else
            echo "-> OSTRZEŻENIE: Nie znaleziono katalogu bin/packages!"
          fi

      - name: Publish release
        id: release
        env:
          UPSTREAM_SHA: ${{ needs.check.outputs.upstream_sha }}
          NSS_SHA: ${{ needs.check.outputs.nss_sha }}
        run: |
          set -euo pipefail
          date=$(date -u +%F)
          timestamp=$(date -u +%Y%m%dT%H%M%SZ)
          tag_name="${RELEASE_PREFIX}-${timestamp}-${GITHUB_RUN_ID}-edma-${{ matrix.nss_version }}"
          echo "release_tag=$tag_name" >>"$GITHUB_OUTPUT"

          {
            echo "## OpenWrt Build — edma-${{ matrix.nss_version }}"
            echo "- **Date**: $date"
            echo "- **Variant**: \`edma-${{ matrix.nss_version }}\`"
            echo "- **Device**: \`${{ env.DEVICE }}\`"
            echo "- **Target**: \`${{ env.TARGET }}\`"
            echo "- **Upstream**: \`${{ env.UPSTREAM_REPO }}@${UPSTREAM_SHA}\`"
            if [[ -n "${NSS_SHA}" ]]; then
              echo "- **NSS**: \`${NSS_SHA}\`"
            fi
            echo "- **Trigger**: \`${GITHUB_EVENT_NAME}\`"
            echo "- **Compiled by**: @Payti"
          } >release_notes.md

          mapfile -t assets < <(find "openwrt/bin/targets/${TARGET}/" -type f -not -path "*/packages/*")

          for asset in "${assets[@]}"; do
            dir=$(dirname "$asset")
            base=$(basename "$asset")
            if [[ ! "$base" =~ ^edma-nss_ ]]; then
              mv "$asset" "$dir/edma-${{ matrix.nss_version }}-$base"
            fi
          done

          mapfile -t renamed_assets < <(find "openwrt/bin/targets/${TARGET}/" -type f -not -path "*/packages/*")

          gh release create "$tag_name" \
            --repo "$GITHUB_REPOSITORY" \
            --title "OpenWrt edma-${{ matrix.nss_version }} $date" \
            --notes-file release_notes.md \
            "${renamed_assets[@]}"

          {
            echo "## Release (edma-${{ matrix.nss_version }})"
            echo "- tag: \`${tag_name}\`"
            echo "- assets: ${#renamed_assets[@]}"
          } >>"$GITHUB_STEP_SUMMARY"

  prune:
    name: Prune old releases
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v7
      - name: Prune
        run: bash scripts/prune-releases.sh
