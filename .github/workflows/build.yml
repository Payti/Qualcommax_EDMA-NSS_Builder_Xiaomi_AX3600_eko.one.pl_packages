name: Build

# All build/release/cleanup behavior reads its configuration from builder.yml.
# The pipeline is a matrix over builder.yml's `variants:` list:
#   config -> check-updates -> build (matrix) -> prune
# The cron schedule below is the only knob that cannot be expressed in builder.yml
# (GitHub Actions cron values must be static strings in this file).
on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Variant(s) to build"
        type: choice
        options:
          - all
          - edma-nss
        default: all
  push:
    branches: [main]
    paths:
      - builder.yml
      - 'devices/**'
      - 'common/**'
      - 'patches/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  schedule:
    - cron: "0 */2 * * *"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  config:
    name: Load builder.yml
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      matrix: ${{ steps.cfg.outputs.matrix }}
      release_keep: ${{ steps.cfg.outputs.release_keep }}
      artifact_retention_days: ${{ steps.cfg.outputs.artifact_retention_days }}
      prefixes: ${{ steps.cfg.outputs.prefixes }}
    steps:
      - uses: actions/checkout@v6
      - id: cfg
        env:
          EVENT_NAME: ${{ github.event_name }}
          VARIANT_INPUT: ${{ github.event.inputs.variant }}
        run: bash scripts/load-config.sh

  check-updates:
    name: Check upstreams
    needs: config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      matrix: ${{ steps.check.outputs.matrix }}
      has_builds: ${{ steps.check.outputs.has_builds }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        env:
          CONFIG_MATRIX: ${{ needs.config.outputs.matrix }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
        run: bash scripts/check-updates.sh

  build:
    name: Build firmware (${{ matrix.nss_version }})
    needs: [config, check-updates]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || needs.check-updates.outputs.build_required == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      actions: read
    
    # DEFINICJA MACIERZY DLA EDMA-NSS
    strategy:
      matrix:
        nss_version: [edma-nss_12.5, edma-nss_11.4]
      fail-fast: false

    env:
      GH_TOKEN: ${{ github.token }}
      MAIN_SHA: ${{ needs.check-updates.outputs.main_sha }}
      NSS_SHA: ${{ needs.check-updates.outputs.nss_sha }}
      DEVICE: ${{ needs.config.outputs.device }}
      DEVICE_DIR: ${{ needs.config.outputs.device_dir }}
      RELEASE_PREFIX: ${{ needs.config.outputs.release_prefix }}-${{ matrix.nss_version }}
      ARTIFACT_RETENTION_DAYS: ${{ needs.config.outputs.artifact_retention_days }}
      FEEDS_LINES: ${{ needs.config.outputs.feeds_lines }}

    steps:
      - name: Install build dependencies
        run: |
          set -euo pipefail
          # Modern OpenWrt (main / 25.xx) builds its own flex/bison/etc. host tools, so the
          # host set is small. rsync is for prepare-build.sh's overlay step. Everything else
          # (file, wget, unzip, yq, jq, gh) is preinstalled on the GitHub runner image.
          sudo apt-get update
          sudo apt-get install -y \
            bzip2 g++ gawk gcc git glibc-source libncurses-dev make rsync

      - name: Checkout OpenWrt source
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.upstream_repo }}
          ref: ${{ matrix.upstream_sha }}
          fetch-depth: 0
          path: openwrt

      - name: Checkout builder repo
        uses: actions/checkout@v6
        with:
          path: builder
      
      # MODYFIKACJA DLA PLIKU CONFIG.EDMA-NSS
      - name: Tweak config for selected NSS Firmware version
        run: |
          set -euo pipefail
          CONFIG_FILE="builder/${{ env.DEVICE_DIR }}/config.edma-nss"
          if [ -f "$CONFIG_FILE" ]; then
            # Dodano '|| true' aby zapobiec wywaleniu skryptu, gdy wpis nie istnieje
            sed -i '/CONFIG_NSS_FIRMWARE_VERSION_/d' "$CONFIG_FILE" || true
            
            # Wstrzyknięcie odpowiedniej wersji na podstawie macierzy
            if [ "${{ matrix.nss_version }}" = "edma-nss_11.4" ]; then
              echo "CONFIG_NSS_FIRMWARE_VERSION_11_4=y" >> "$CONFIG_FILE"
              echo "Successfully patched config.edma-nss with CONFIG_NSS_FIRMWARE_VERSION_11_4=y"
            else
              echo "CONFIG_NSS_FIRMWARE_VERSION_12_5=y" >> "$CONFIG_FILE"
              echo "Successfully patched config.edma-nss with CONFIG_NSS_FIRMWARE_VERSION_12_5=y"
            fi
          else
            echo "::warning::Config file not found at $CONFIG_FILE"
          fi

      # NAPRAWIONY KROK: Przekazanie VARIANT do skryptu prepare-build.sh
      - name: Prepare build environment
        env:
          OPENWRT_DIR: ${{ github.workspace }}/openwrt
          BUILDER_REPO: ${{ github.workspace }}/builder
          VARIANT: ${{ matrix.nss_version }}  # <--- TA LINIA NAPRAWIA BŁĄD
        run: bash builder/scripts/prepare-build.sh

      # DYNAMICZNY BANNER DOSTOSOWANY DO WERSJI EDMA-NSS
      - name: Dynamically update custom OpenWrt banner info
        working-directory: openwrt
        run: |
          set -euo pipefail

          if [ -f scripts/getver.sh ]; then
            OPENWRT_VERSION_RAW=$(bash scripts/getver.sh)
          else
            OPENWRT_VERSION_RAW=$(git rev-parse --short=10 HEAD)
          fi

          OPENWRT_VERSION="OpenWrt SNAPSHOT, ${OPENWRT_VERSION_RAW}"
          CURRENT_BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")

          if [ -f files/etc/banner ]; then
            VERSION_LINE="OpenWrt SNAPSHOT, ${OPENWRT_VERSION_RAW} (${{ matrix.nss_version }})"
            DATE_LINE="Build time: $CURRENT_BUILD_TIME"

            # DOPASOWANIE MATEMATYCZNE DLA SYMETRII EDMA-NSS (Łącznie 76 znaków):
            # " | " (3 znaki) + %-72s (72 znaki bufora) + "|" (1 znak) = Dokładnie 76 znaków.
            
            VERSION_PADDING=$(printf '%-72s' "$VERSION_LINE")
            FINAL_VERSION_ROW=" | ${VERSION_PADDING}|"

            DATE_PADDING=$(printf '%-72s' "$DATE_LINE")
            FINAL_DATE_ROW=" | ${DATE_PADDING}|"

            sed -i "s#.*VERSION_PLACEHOLDER.*#$FINAL_VERSION_ROW#g" files/etc/banner
            sed -i "s#.*DATE_PLACEHOLDER.*#$FINAL_DATE_ROW#g" files/etc/banner

            echo "Successfully injected real git version and build time into EDMA-NSS banner."
          else
            echo "::warning::Custom banner file was not deployed by prepare-build.sh to openwrt/files/etc/banner"
            VERSION_LINE="OpenWrt SNAPSHOT"
            FINAL_VERSION_ROW=""
            DATE_LINE=""
            FINAL_DATE_ROW=""
          fi

          # Aktualizacja informacji dla panelu WWW (LuCI)
          TARGET_RELEASE_FILE="package/base-files/files/etc/openwrt_release"
          DISTRIB_DESCRIPTION="${OPENWRT_VERSION} (${{ matrix.nss_version }} - NSS build by @Payti)"
          if [ -f "$TARGET_RELEASE_FILE" ]; then
            sed -i '/DISTRIB_DESCRIPTION=/d' "$TARGET_RELEASE_FILE" || true
            echo "DISTRIB_DESCRIPTION='${DISTRIB_DESCRIPTION}'" >> "$TARGET_RELEASE_FILE"
          fi

          echo "=================================================="
          echo "OPENWRT_VERSION:         $OPENWRT_VERSION"
          echo "CURRENT_BUILD_TIME:      $CURRENT_BUILD_TIME"
          echo "VERSION_LINE:            ${VERSION_LINE:-}"
          echo "DATE_LINE:               ${DATE_LINE:-}"
          echo "FINAL_VERSION_ROW:       ${FINAL_VERSION_ROW:-}"
          echo "FINAL_DATE_ROW:          ${FINAL_DATE_ROW:-}"
          echo "=================================================="

      - name: Prepare build environment
        env:
          OPENWRT_DIR: ${{ github.workspace }}/openwrt
          BUILDER_REPO: ${{ github.workspace }}/builder
          VARIANT: ${{ matrix.variant }}
          DEVICE: ${{ matrix.device }}
        run: bash builder/scripts/prepare-build.sh

      - name: Set reproducible-build env
        working-directory: openwrt
        run: |
          set -euo pipefail
          {
            echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)"
            echo "TZ=UTC"
            echo "LC_ALL=C"
            echo "KBUILD_BUILD_USER=builder"
            echo "KBUILD_BUILD_HOST=github"
          } >>"$GITHUB_ENV"

      - name: Download sources
        working-directory: openwrt
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            make download -j"$(nproc)" V=s && break
            echo "Download attempt $attempt failed; retrying..."
            sleep 5
          done

      - name: Build
        working-directory: openwrt
        run: |
          set -euo pipefail
          if ! make -j"$(nproc)"; then
            echo "::warning::Parallel build failed; retrying single-threaded for diagnostics"
            make -j1 V=s
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.variant }}-${{ matrix.device }}-images
          path: openwrt/bin/targets/${{ matrix.target }}
          if-no-files-found: error
          retention-days: ${{ needs.config.outputs.artifact_retention_days }}

      - name: Publish release
        id: release
        env:
          VARIANT: ${{ matrix.variant }}
          DEVICE: ${{ matrix.device }}
          TARGET: ${{ matrix.target }}
          RELEASE_PREFIX: ${{ matrix.release_prefix }}
          UPSTREAM_REPO: ${{ matrix.upstream_repo }}
          UPSTREAM_SHA: ${{ matrix.upstream_sha }}
          NSS_SHA: ${{ matrix.nss_sha }}
        run: |
          set -euo pipefail
          date=$(date -u +%F)
          timestamp=$(date -u +%Y%m%dT%H%M%SZ)
          tag_name="${RELEASE_PREFIX}-${timestamp}-${GITHUB_RUN_ID}"
          echo "release_tag=$tag_name" >>"$GITHUB_OUTPUT"

          {
            echo "## OpenWrt Build — ${VARIANT}"
            echo "- **Date**: $date"
            echo "- **Variant**: \`${VARIANT}\`"
            echo "- **Device**: \`${DEVICE}\`"
            echo "- **Target**: \`${TARGET}\`"
            echo "- **Upstream**: \`${UPSTREAM_REPO}@${UPSTREAM_SHA}\`"
            if [[ -n "${NSS_SHA}" ]]; then
              echo "- **NSS**: \`${NSS_SHA}\`"
            fi
            echo "- **Trigger**: \`${GITHUB_EVENT_NAME}\`"
          } >release_notes.md

          mapfile -t assets < <(find openwrt/bin/targets/qualcommax/ipq807x/ -type f -not -path "*/packages/*")
          
          # Zmiana nazw plików binarnych przed wysłaniem na serwer
          for asset in "${assets[@]}"; do
            dir=$(dirname "$asset")
            base=$(basename "$asset")
            mv "$asset" "$dir/${{ matrix.nss_version }}-$base"
          done
          mapfile -t renamed_assets < <(find openwrt/bin/targets/qualcommax/ipq807x/ -type f -not -path "*/packages/*")

          gh release create "$tag_name" \
            --repo "$GITHUB_REPOSITORY" \
            --title "OpenWrt EDMA-NSS Build $date (${{ matrix.nss_version }})" \
            --notes-file release_notes.md \
            "${renamed_assets[@]}"

          {
            echo "## Release (${VARIANT})"
            echo "- tag: \`${tag_name}\`"
            echo "- assets: ${#assets[@]}"
          } >>"$GITHUB_STEP_SUMMARY"

  prune:
    name: Prune old releases
    needs: [config, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      KEEP: ${{ needs.config.outputs.release_keep }}
      PREFIXES: ${{ needs.config.outputs.prefixes }}
    steps:
      - uses: actions/checkout@v6
      - name: Prune each variant prefix
        run: |
          set -euo pipefail
          while IFS= read -r prefix; do
            [[ -z "$prefix" ]] && continue
            echo "::group::prune $prefix"
            PREFIX="$prefix" bash scripts/prune-releases.sh
            echo "::endgroup::"
          done <<< "$PREFIXES"
